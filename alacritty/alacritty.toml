[terminal.shell]
program = "/bin/zsh"

[font]
size = 20.0

[font.offset]
y=0 # ZEN_OFFSET

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[window]
#opacity = 0.8

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
